<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Rajalakshmy Book Store</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eaf4ff,#ffffff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#0066cc;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            border:1px solid #cfd8dc;
            border-radius:10px;
            font-size:16px;
            margin-top:10px;
            outline:none;
        }

        input:focus{
            border-color:#0066cc;
            box-shadow:0 0 8px rgba(0,102,204,0.2);
        }

        button{
            width:100%;
            padding:15px;
            background:#0066cc;
            color:white;
            border:none;
            border-radius:10px;
            font-size:17px;
            font-weight:bold;
            margin-top:20px;
            cursor:pointer;
        }

        button:hover{
            background:#0052a3;
        }

        .back{
            margin-top:20px;
        }

        .back a{
            color:#0066cc;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🔐 Forgot Password</h1>

    <p>
        Enter your registered email address.
        We'll send you a password reset link.
    </p>

    <form method="post">

        {% csrf_token %}

        {{ form.email }}

        <button type="submit">
            Send Reset Link
        </button>

    </form>

    <div class="back">
        <a href="{% url 'login' %}">
            ← Back to Login
        </a>
    </div>

</div>

</body>
</html>
