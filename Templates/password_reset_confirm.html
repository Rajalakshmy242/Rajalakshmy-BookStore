<!DOCTYPE html>
<html>
<head>
<title>Create New Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eaf4ff,#ffffff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{

    width:550px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.icon{

    text-align:center;

    font-size:60px;

    color:#0066ff;

    margin-bottom:15px;
}

h1{

    text-align:center;

    color:#0066ff;

    margin-bottom:10px;
}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:30px;
}

input{

    width:100%;

    padding:15px;

    border:1px solid #ddd;

    border-radius:12px;

    margin-top:10px;

    margin-bottom:15px;

    font-size:16px;
}

input:focus{

    border-color:#0066ff;

    box-shadow:0 0 8px rgba(0,102,255,.2);

    outline:none;
}

.helptext{

    background:#f3f8ff;

    border:1px solid #cfe2ff;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

    color:#444;
}

button{

    width:100%;

    padding:15px;

    background:#0066ff;

    color:white;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;
}

button:hover{

    background:#0052cc;
}

.back{

    text-align:center;

    margin-top:20px;
}

.back a{

    text-decoration:none;

    color:#0066ff;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

    <div class="icon">🔒</div>

    <h1>Create New Password</h1>

    <p class="subtitle">
        Choose a strong password to keep your account secure.
    </p>

    <form method="post">

        {% csrf_token %}

        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}

        <div class="helptext">
            {{ form.new_password1.help_text|safe }}
        </div>

        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}

        <button type="submit">
            Reset Password
        </button>

    </form>

    <div class="back">

        <a href="{% url 'login' %}">
            ← Back to Login
        </a>

    </div>

</div>

</body>
</html>
