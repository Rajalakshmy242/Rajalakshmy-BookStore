<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>

<style>

body{
    background:linear-gradient(135deg,#10B981,#059669);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.success-box{
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    width:500px;
}

.tick{
    font-size:100px;
    color:#10B981;
}

h1{
    margin-top:15px;
    color:#0F172A;
}

p{
    color:#64748B;
    margin:15px 0;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#2563EB;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:12px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="success-box">

    <div class="tick">✔️</div>

    <h1>Order Placed Successfully!</h1>

    <p>
        Thank you for shopping with
        Rajalakshmy Book Store.
    </p>

    <a href="{% url 'orders' %}"
       class="btn">
       📦 View Orders
    </a>

</div>

</body>
</html>
