<!DOCTYPE html>
<html>
<head>
    <title>Mail Sent</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<script>

Swal.fire({
    icon: 'success',
    title: 'Mail Sent!',
    text: 'Password reset link has been sent to your email.',
    confirmButtonColor: '#0066cc'
}).then(() => {

    window.location.href = "/login/";

});

</script>

</body>
</html>
