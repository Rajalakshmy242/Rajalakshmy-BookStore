<!DOCTYPE html>
<html>
<head>
<title>Choose Payment Method</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:0;
}

.container{
    max-width:1100px;
    margin:60px auto;
    text-align:center;
}

.title{
    color:white;
    margin-bottom:30px;
}

.title h1{
    font-size:42px;
}

.summary{
    background:white;
    width:350px;
    margin:0 auto 40px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.amount{
    font-size:36px;
    color:#28a745;
    font-weight:bold;
}

.payment-options{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.payment-card{
    background:white;
    width:420px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.icon{
    font-size:60px;
}

.payment-card h2{
    margin:15px 0;
}

.payment-card p{
    color:#666;
}

.cod-btn,
.pay-btn{
    display:block;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    margin-top:15px;
}

.cod-btn{
    background:#f59e0b;
}

.cod-btn:hover{
    background:#d97706;
}

.pay-btn{
    background:#28a745;
}

.pay-btn:hover{
    background:#218838;
}

.qr-box{
    margin:20px 0;
}

.qr-box img{
    width:220px;
    border-radius:12px;
}

.upi-id{
    background:#f4f4f4;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>💳 Choose Payment Method</h1>
    </div>

    <div class="summary">
        <h3>Total Amount</h3>

        <div class="amount">
            ₹{{ total }}
        </div>
    </div>

    <div class="payment-options">

        <!-- COD -->

        <div class="payment-card">

            <div class="icon">💵</div>

            <h2>Cash On Delivery</h2>

            <p>
                Pay when your order is delivered.
            </p>

            <a href="{% url 'place_order' %}"
               class="cod-btn">
               📦 Place Order
            </a>

        </div>

        <!-- UPI -->

        <div class="payment-card">

            <div class="icon">📱</div>

            <h2>UPI Payment</h2>

            <p>
                Scan QR Code or use UPI ID
            </p>

            <div class="qr-box">

                <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=bookstore@upi">

            </div>

            <div class="upi-id">
                bookstore@upi
            </div>

            <a href="{% url 'payment_success' %}"
               class="pay-btn">
               ✅ I Have Paid
            </a>

        </div>

    </div>

</div>

</body>
</html>
