<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:linear-gradient(135deg,#eaf4ff,#ffffff);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .otp-box{

        width:500px;

        background:white;

        padding:50px;

        border-radius:25px;

        box-shadow:0 10px 30px rgba(0,0,0,0.15);

        text-align:center;
    }

    .icon{

        font-size:70px;

        margin-bottom:15px;
    }

    h1{

        color:#0066ff;

        margin-bottom:10px;
    }

    .subtitle{

        color:#666;

        margin-bottom:30px;

        font-size:17px;
    }

    input{

        width:100%;

        padding:16px;

        border:1px solid #ddd;

        border-radius:12px;

        font-size:18px;

        text-align:center;

        letter-spacing:4px;

        margin-bottom:20px;
    }

    input:focus{

        outline:none;

        border-color:#0066ff;

        box-shadow:0 0 10px rgba(0,102,255,.2);
    }

    button{

        width:100%;

        padding:16px;

        background:#0066ff;

        color:white;

        border:none;

        border-radius:12px;

        font-size:18px;

        font-weight:bold;

        cursor:pointer;
    }

    button:hover{

        background:#0052cc;
    }

    .message{

        margin-top:15px;

        color:red;

        font-weight:bold;
    }

    .resend{

        margin-top:20px;
    }

    .resend a{

        text-decoration:none;

        color:#0066ff;

        font-weight:bold;
    }

    </style>

</head>

<body>

<div class="otp-box">

    <div class="icon">📩</div>

    <h1>Email OTP Verification</h1>

    <p class="subtitle">
        Enter the 6-digit OTP sent to your email address
    </p>
    <p id="timer"
   style="color:red;font-weight:bold;margin-bottom:20px;">
   02:00
</p>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter OTP"
            required
        >

        <button type="submit">
            Verify OTP
        </button>

    </form>

    {% if message %}
    <div class="message">
        {{ message }}
    </div>
    {% endif %}

   <div class="resend">

    <a href="{% url 'resend_otp' %}"
       id="resendBtn"
       style="display:none;">
       🔄 Resend OTP
    </a>

    <br><br>

    <a href="{% url 'login' %}">
       ← Back to Login
    </a>

</div>

</div>
<script>

let time = 120;

let timer = document.getElementById("timer");

let resendBtn = document.getElementById("resendBtn");

let countdown = setInterval(function(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    timer.innerHTML =
        minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    time--;

    if(time < 0){

        clearInterval(countdown);

        timer.innerHTML = "❌ OTP Expired";

        resendBtn.style.display = "inline-block";
    }

},1000);

</script>

</body>
</html>
